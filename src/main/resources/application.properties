spring.application.name=File-Drive-Spring

# H2 in-memory database
spring.datasource.url=jdbc:h2:file:./data/mydb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.settings.web-allow-others=true

# Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- MinIO / S3 ---
s3.endpoint=${S3_ENDPOINT}
s3.access-key=${S3_ACCESS_KEY}
s3.secret-key=${S3_SECRET_KEY}
#s3.bucket=${S3_BUCKET}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expires-minutes=${JWT_EXPIRES_MINUTES:15}

spring.servlet.multipart.max-file-size=100GB
spring.servlet.multipart.max-request-size=100GB
# --- Server ---
server.port=8080